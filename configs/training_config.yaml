
### `configs/training_config.yaml`
```yaml
# Training Configuration
# Author: Amit Pimpalkar
# Organization: RBU, Nagpur
# Year: 2026

experiment:
  name: "equity_aware_tutor"
  seed: 42
  device: "cuda"
  log_interval: 50
  checkpoint_interval: 1000

data:
  batch_size: 64
  num_workers: 4
  sequence_length: 50
  validation_split: 0.15
  test_split: 0.15
  minority_oversample_ratio: 1.5
  synthetic_interpolation_neighbors: 5
  augmentation_probability: 0.15
  temporal_noise_scale: 0.05

model:
  hidden_dimension: 256
  demographic_embedding_dim: 128
  num_gru_layers: 2
  attention_heads: 4
  attention_dropout: 0.1
  classifier_dropout: 0.2

optimization:
  epochs: 100
  base_learning_rate: 0.0003
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  warmup_steps: 500
  optimizer: "adamw"
  beta1: 0.9
  beta2: 0.999
  epsilon: 1.0e-8
  scheduler: "cosine_with_warmup"
  min_learning_rate: 1.0e-6

multi_objective:
  initial_accuracy_weight: 0.40
  initial_equity_weight: 0.35
  initial_engagement_weight: 0.25
  meta_learning_rate: 0.001
  weight_update_frequency: 5
  weight_lower_bound: 0.05
  gradient_smoothing_factor: 0.05
  second_order_regularization: 0.01
  counterfactual_samples_per_trajectory: 3
  demographic_intervention_method: "empirical_sampling"
  fairness_attention_regularization: 0.01
  engagement_residual_threshold: 0.1
  distillation_temperature: 2.0
  equity_retention_penalty: 0.5
  target_compression_ratio: 0.6

early_stopping:
  patience: 10
  min_delta: 0.001
  monitor_metric: "composite_validation_score"